packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  "@tailwindcss/oxide": true
  esbuild: true

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.1.21
  typescript: ~6.0.3
  "@types/node": ~25.7.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
