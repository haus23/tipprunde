<!doctype html>
<html lang="de">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>%sveltekit.status% · runde.tips</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100svh;
        background: light-dark(#fdfcfb, #000000);
        color: light-dark(#211f14, #eeede8);

        text-align: center;
        padding: 2rem;
      }
      .status {
        font-size: 6rem;
        font-weight: 700;
        opacity: 0.3;
        margin: 0;
        line-height: 1;
      }
      .message {
        font-size: 1.125rem;
        margin: 1rem 0 0;
      }
      .hint {
        font-size: 0.875rem;
        opacity: 0.5;
        margin: 0.5rem 0 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="status">%sveltekit.status%</p>
      <p class="message">%sveltekit.error.message%</p>
